services:
  - type: web
    name: hiretrack
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
        placeholder: "Enter your MongoDB Connection String (e.g. mongodb+srv://...)"
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
